<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input, select {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 5px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

/* SUCCESS / ERROR */
.success { color: green; }
.error { color: red; }

/* FOOTER */
.footer {
    text-align: center;
    font-size: 14px;
    color: white;
    margin: 10px 0;
}
</style>

</head>

<body>

<div class="container">

<!-- 📥 ATTENDANCE ENTRY -->
<div class="card">
    <h3>📥 Attendance Entry</h3>

    <form method="POST">

        <input type="date" name="date" required>

        <select name="floor" required>
            <option value="">Select Floor</option>
            {% for f in floors %}
            <option>{{ f }}</option>
            {% endfor %}
        </select>

        <input type="number" name="floor_strength" id="floor_strength" placeholder="Floor Strength" required>

        <table border="1">
            <tr>
                <th>Year</th>
                <th>Strength</th>
                <th>Present</th>
                <th>Leave</th>
                <th>Absent</th>
            </tr>

            {% for y in years %}
            <tr>
                <td>{{ y }}</td>
                <td><input type="number" name="{{y}}_strength" required></td>
                <td><input type="number" name="{{y}}_present" required></td>
                <td><input type="number" name="{{y}}_leave" required></td>
                <td><input type="number" name="{{y}}_absent" required></td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit">💾 Save</button>
    </form>

    {% if message %}
        <p class="{{ 'success' if '✅' in message else 'error' }}">{{ message }}</p>
    {% endif %}
</div>


<!-- 📊 REPORT GENERATION -->
<div class="card">
    <h3>📊 Generate Report</h3>

    <form method="POST" action="/report">

        <select name="report_type" required>
            <option value="">Select Report Type</option>
            <option value="summary">Summary</option>
            <option value="partly">Year Wise</option>
            <option value="full">Full Report</option>
        </select>

        <input type="month" name="month" required>

        <button type="submit">📊 Generate</button>
    </form>
</div>

</div>

<!-- 👇 FOOTER -->
<div class="footer">
    Created by Biswa Ranjan Mishra 🚀
</div>

</body>
</html>
