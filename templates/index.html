<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance</title>

<style>
body {font-family:Arial; background:#eef2f7;}
.card {background:white; padding:15px; border-radius:12px; margin:10px;}
input, select {width:100%; padding:8px; margin:5px 0; border-radius:6px;}
button {background:#007bff; color:white; padding:10px; border:none; width:100%; border-radius:8px;}
h3 {background:#007bff; color:white; padding:5px; border-radius:6px;}
.footer {position:fixed; bottom:0; width:100%; background:#222; color:white; text-align:center; padding:10px;}
</style>
</head>

<body>

<h2>📱 Attendance Entry</h2>

<div class="card">
<form method="POST">

Hostel:
<input type="text" name="hostel" value="KP-15">

Date:
<input type="date" name="date" required>

Floor:
<select name="floor">
{% for f in floors %}
<option>{{f}}</option>
{% endfor %}
</select>

Floor Strength:
<input type="number" name="floor_strength" required>

{% for year in years %}
<h3>{{year}}</h3>
Strength <input type="number" name="{{year}}_strength">
Present <input type="number" name="{{year}}_present">
Leave <input type="number" name="{{year}}_leave">
Absent <input type="number" name="{{year}}_absent">
{% endfor %}

<button type="submit">💾 Save Floor Data</button>
</form>

<p>{{message}}</p>
</div>

<div class="card">
<form method="POST" action="/report">
<select name="report_type">
<option>Full</option>
<option>Partly</option>
<option>Summary</option>
</select>

<button type="submit">📊 Generate Report</button>
</form>
</div>

<div class="footer">
Created by Biswa Ranjan Mishra
</div>

</body>
</html>
