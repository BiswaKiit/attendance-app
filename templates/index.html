<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ PWA Support -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/favicon.png">
</head>

<body>

<div class="container">

    <h1>KING PALACE - 15</h1>

    <!-- ================= ATTENDANCE ENTRY CARD ================= -->
    <div class="card">

        <h2>Attendance Entry</h2>

        <form method="POST" action="/save" onsubmit="return validateForm()">

            <label>Date:</label>
            <input type="date" name="date" required>

            <hr>

            {% set floors = ["Ground", "1st", "2nd", "3rd"] %}
            {% set years = ["1st Year", "2nd Year", "3rd Year", "4th Year"] %}

            {% for floor in floors %}
                <div class="floor-box">

                    <h3>{{ floor }} Floor</h3>

                    <!-- Floor Strength + Attendant -->
                    <div class="row">
                        <input type="number" name="{{ floor }}_strength" placeholder="Floor Strength" required>

                        <select name="{{ floor }}_attendant" required>
                            <option value="">Select Attendant</option>
                            {% for a in attendants %}
                                <option value="{{ a }}">{{ a }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Year-wise Inputs -->
                    {% for year in years %}
                        <div class="row">
                            <label>{{ year }}</label>

                            <input type="number" name="{{ floor }}_{{ year }}_strength" placeholder="Strength" required>
                            <input type="number" name="{{ floor }}_{{ year }}_present" placeholder="Present" required>
                            <input type="number" name="{{ floor }}_{{ year }}_leave" placeholder="Leave" required>
                            <input type="number" name="{{ floor }}_{{ year }}_absent" placeholder="Absent" required>
                        </div>
                    {% endfor %}

                </div>
                <hr>
            {% endfor %}

            <button type="submit">Save Attendance</button>

        </form>
    </div>

    <!-- ================= REPORT CARD ================= -->
    <div class="card">

        <h2>Generate Report</h2>

        <form method="POST" action="/report">

            <label>Select Date:</label>
            <input type="date" name="date" required>

            <label>Report Type:</label>
            <select name="report_type">
                <option value="summary">Summary</option>
                <option value="part">Part Report</option>
                <option value="full">Full Report</option>
            </select>

            <button type="submit">Generate Report</button>

        </form>

    </div>

    <!-- ================= FOOTER ================= -->
    <footer style="text-align:center; margin-top:20px;">
        <p>Developed by Biswa</p>
    </footer>

</div>

<!-- ================= VALIDATION SCRIPT ================= -->
<script>
function validateForm() {

    let inputs = document.querySelectorAll("input[type='number']");

    for (let input of inputs) {
        if (input.value === "") {
            input.value = 0;
        }
    }

    return true;
}
</script>

</body>
</html>
