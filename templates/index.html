<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 15px; }
        .header { background: #4e73df; color: white; padding: 15px; text-align: center; }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #4e73df;
            color: white;
            text-align: center;
            padding: 8px;
        }
    </style>
</head>

<body>

<div class="header">
    <h4>🏠 Hostel Attendance (KP-15)</h4>
</div>

<div class="container mt-3 mb-5">

    {% if message %}
    <div class="alert alert-info">{{ message }}</div>
    {% endif %}

    <form method="POST">

        <div class="card p-3 mb-3">
            <h5>📅 Basic Info</h5>

            <input type="date" name="date" class="form-control mb-2" required>

            <select name="floor" class="form-select mb-2">
                {% for f in floors %}
                <option>{{ f }}</option>
                {% endfor %}
            </select>

            <input type="number" name="floor_strength" placeholder="Floor Total Strength" class="form-control">
        </div>

        <div class="card p-3 mb-3">
            <h5>📊 Year-wise Data</h5>

            {% for y in years %}
            <div class="border p-2 mb-2 rounded">
                <strong>{{ y }}</strong>

                <input name="{{y}}_strength" class="form-control mt-1" placeholder="Strength">
                <input name="{{y}}_present" class="form-control mt-1" placeholder="Present">
                <input name="{{y}}_leave" class="form-control mt-1" placeholder="Leave">
                <input name="{{y}}_absent" class="form-control mt-1" placeholder="Absent">
            </div>
            {% endfor %}
        </div>

        <button class="btn btn-success w-100">💾 Save Data</button>

    </form>

    <hr>

    <div class="card p-3">
        <h5>📈 Generate Report</h5>

        <form method="POST" action="/report">
            <input type="month" name="month" class="form-control mb-2">

            <select name="report_type" class="form-select mb-2">
                <option value="full">Full Report</option>
                <option value="partial">Part Report</option>
                <option value="summary">Summary</option>
            </select>

            <button class="btn btn-primary w-100">📊 View Report</button>
        </form>
    </div>

</div>

<div class="footer">
    Created by Biswa Ranjan Mishra
</div>

</body>
</html>
