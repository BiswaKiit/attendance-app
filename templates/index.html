<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h2>KP-15 Attendance</h2>
    </div>

    <h3>Enter Attendance</h3>

    {% if message %}
        <p style="color:red;">{{ message }}</p>
    {% endif %}

    <form method="POST">

        Date:
        <input type="date" name="date" required><br><br>

        Floor:
        <select name="floor">
            {% for f in floors %}
                <option value="{{ f }}">{{ f }}</option>
            {% endfor %}
        </select><br><br>

        Floor Strength:
        <input type="number" name="floor_strength"><br><br>

        {% for year in years %}
            <h4>{{ year }}</h4>

            Strength:
            <input type="number" name="{{ year }}_strength">

            Present:
            <input type="number" name="{{ year }}_present">

            Leave:
            <input type="number" name="{{ year }}_leave">

            Absent:
            <input type="number" name="{{ year }}_absent"><br><br>
        {% endfor %}

        <button type="submit">Save</button>
    </form>

    <hr>

    <form method="POST" action="/report">
        <select name="report_type">
            <option value="full">Full Report</option>
            <option value="partly">Partly Report</option>
            <option value="summary">Summary</option>
        </select>

        <button type="submit">Generate Report</button>
    </form>

</div>

<!-- Footer -->
<div class="footer">
    Created by Biswa Ranjan Mishra
</div>

</body>
</html>
