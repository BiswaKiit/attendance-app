<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KP-15 Attendance</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h1>KP-15 Attendance</h1>
    </div>

    <!-- Message -->
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <!-- Form -->
    <form method="POST">

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Floor</label>
        <select name="floor" required>
            {% for f in floors %}
                <option value="{{ f }}">{{ f }}</option>
            {% endfor %}
        </select>

        <label>Floor Strength</label>
        <input type="number" name="floor_strength">

        <hr>

        {% for year in years %}
        <div class="year-block">
            <h3>{{ year }}</h3>

            <input type="number" name="{{ year }}_strength" placeholder="Strength">
            <input type="number" name="{{ year }}_present" placeholder="Present">
            <input type="number" name="{{ year }}_leave" placeholder="Leave">
            <input type="number" name="{{ year }}_absent" placeholder="Absent">
        </div>
        {% endfor %}

        <button type="submit">💾 Save Data</button>
    </form>

    <hr>

    <!-- Report -->
    <form method="POST" action="/report">
        <select name="report_type">
            <option value="full">Full Report</option>
            <option value="partly">Partly Report</option>
            <option value="summary">Summary</option>
        </select>

        <button type="submit">📊 Generate Report</button>
    </form>

</div>

</body>
</html>
