<!DOCTYPE html>
<html>
<head>
<title>Attendance App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#f2f2f2; padding:10px;}
.card {background:white; padding:15px; border-radius:10px; margin-bottom:15px;}
input, select {width:100%; padding:8px; margin:5px 0;}
button {background:#4CAF50; color:white; padding:10px; border:none; width:100%;}
.footer {background:#333; color:white; text-align:center; padding:10px; position:fixed; bottom:0; width:100%;}
</style>
</head>

<body>

<h2>📱 Attendance Entry</h2>

<div class="card">
<form method="POST">

Hostel:
<input type="text" name="hostel" value="KP-15">

Date:
<input type="date" name="date" required>

Floor:
<select name="floor">
{% for f in floors %}
<option>{{f}}</option>
{% endfor %}
</select>

Floor Strength:
<input type="number" name="floor_strength" required>

<hr>

{% for year in years %}
<b>{{year}}</b>
Present <input type="number" name="{{year}}_present">
Leave <input type="number" name="{{year}}_leave">
Absent <input type="number" name="{{year}}_absent">
{% endfor %}

<button type="submit">💾 Save Floor Data</button>

</form>

<p>{{message}}</p>
</div>

<div class="card">
<form method="POST" action="/report">

<select name="report_type">
<option>Full</option>
<option>Summary</option>
</select>

Month:
<input type="month" name="month">

<button type="submit">📊 Generate Report</button>

</form>
</div>

<div class="footer">
Created by Biswa Ranjan Mishra
</div>

</body>
</html>
