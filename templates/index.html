<!DOCTYPE html>
<html>
<head>
    <title>KING PALACE - 15</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="container">

    <h1 class="title">🏠 KING PALACE - 15</h1>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}

    <!-- ================= ATTENDANCE ENTRY ================= -->
    <div class="card entry-card">

        <h2>📋 Attendance Entry</h2>

        <form method="POST" onsubmit="return validateForm()">

            <div class="top-row">

                <input type="date" name="date" required>

                <select name="floor" required>
                    <option value="">Select Floor</option>
                    {% for f in floors %}
                        <option value="{{ f }}">{{ f }}</option>
                    {% endfor %}
                </select>

                <select name="attendant">
                    <option>Sunam</option>
                    <option>Rabi Narayan</option>
                    <option>Nrushingha</option>
                    <option>Satya</option>
                    <option>Alok</option>
                    <option>Sarat</option>
                    <option>Subasish</option>
                </select>

            </div>

            <div class="floor-box">
                <label>Floor Strength</label>
                <input type="number" name="floor_strength" readonly>
            </div>

            <!-- TABLE -->
            <table class="data-table">
                <tr>
                    <th>Year</th>
                    <th>Strength</th>
                    <th>Present</th>
                    <th>Leave</th>
                    <th>Absent</th>
                </tr>

                {% for y in years %}
                <tr>
                    <td>{{ y }}</td>
                    <td><input type="number" name="{{ y.split()[0] }}_strength" required></td>
                    <td><input type="number" name="{{ y.split()[0] }}_present" required></td>
                    <td><input type="number" name="{{ y.split()[0] }}_leave" required></td>
                    <td><input type="number" name="{{ y.split()[0] }}_absent" required></td>
                </tr>
                {% endfor %}
            </table>

            <button type="submit" class="btn-save">💾 Save</button>

        </form>
    </div>


    <!-- ================= REPORT GENERATION ================= -->
    <div class="card report-card">

        <h2>📊 Generate Report</h2>

        <form action="/report" method="POST">

            <input type="date" name="date" required>

            <select name="report_type">
                <option value="summary">Summary</option>
                <option value="partly">Part Report</option>
                <option value="full">Full Report</option>
            </select>

            <button type="submit" class="btn-report">Generate</button>

        </form>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    Developed by ❤️ Biswa Ranjan Mishra
</div>

<!-- ================= SCRIPTS ================= -->

<script>

// AUTO CALCULATION
document.addEventListener("input", function () {

    let years = ["1st", "2nd", "3rd", "4th"];
    let totalStrength = 0;

    years.forEach(y => {

        let s = Number(document.querySelector(`[name='${y}_strength']`)?.value || 0);
        let p = Number(document.querySelector(`[name='${y}_present']`)?.value || 0);
        let l = Number(document.querySelector(`[name='${y}_leave']`)?.value || 0);
        let a = Number(document.querySelector(`[name='${y}_absent']`)?.value || 0);

        // highlight error
        if (s !== (p + l + a)) {
            document.querySelector(`[name='${y}_strength']`).style.border = "2px solid red";
        } else {
            document.querySelector(`[name='${y}_strength']`).style.border = "";
        }

        totalStrength += s;
    });

    document.querySelector("[name='floor_strength']").value = totalStrength;
});


// VALIDATION
function validateForm() {

    let years = ["1st", "2nd", "3rd", "4th"];
    let totalStrength = 0;
    let floorStrength = Number(document.querySelector("[name='floor_strength']").value || 0);

    for (let y of years) {

        let s = Number(document.querySelector(`[name='${y}_strength']`).value || 0);
        let p = Number(document.querySelector(`[name='${y}_present']`).value || 0);
        let l = Number(document.querySelector(`[name='${y}_leave']`).value || 0);
        let a = Number(document.querySelector(`[name='${y}_absent']`).value || 0);

        if (s !== (p + l + a)) {
            alert(`${y} Year mismatch!`);
            return false;
        }

        totalStrength += s;
    }

    if (floorStrength !== totalStrength) {
        alert("Floor strength mismatch!");
        return false;
    }

    return true;
}


// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log("Service Worker Registered"));
}

</script>

</body>
</html>
