<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h2>Hostel Attendance</h2>

    <form method="POST">

        <input type="date" name="date" required>
        <input type="text" name="hostel" value="KP-15">

        <select name="floor">
            {% for f in floors %}
            <option value="{{f}}">{{f}}</option>
            {% endfor %}
        </select>

        <input type="number" id="floor_strength" name="floor_strength" placeholder="Floor Total Strength" readonly>

        <hr>

        {% for year in years %}
        <div class="year-block" id="{{year}}">
            <b>{{year}}</b>

            <div class="row">
                <input type="number" placeholder="Strength" name="{{year}}_strength" oninput="updateAll()">
                <input type="number" placeholder="Present" name="{{year}}_present" oninput="validate('{{year}}')">
            </div>

            <div class="row">
                <input type="number" placeholder="Leave" name="{{year}}_leave" oninput="validate('{{year}}')">
                <input type="number" placeholder="Absent" name="{{year}}_absent" oninput="validate('{{year}}')">
            </div>

        </div>
        {% endfor %}

        <button type="submit" id="saveBtn">💾 Save</button>

    </form>

    <!-- 📊 REPORT SECTION -->
    <div class="report-box">

        <h3>Generate Report</h3>

        <form action="/report" method="POST">

            <select name="report_type" required>
                <option value="">Select Report Type</option>
                <option value="full">Full Report</option>
                <option value="part">Part Report</option>
                <option value="summary">Summary</option>
            </select>

            <input type="date" name="date">
            <input type="month" name="month">

            <button type="submit">Generate Report</button>

        </form>

    </div>

</div>

<div class="footer">
    Created by Biswa Ranjan Mishra
</div>

<script>

function getVal(name) {
    let el = document.getElementsByName(name)[0];
    return el && el.value ? parseInt(el.value) : 0;
}

function updateAll() {
    let years = ["1st Year","2nd Year","3rd Year","4th Year"];
    let total = 0;

    years.forEach(y => {
        total += getVal(y+"_strength");
    });

    document.getElementById("floor_strength").value = total;
}

function validate(year) {

    let s = getVal(year+"_strength");
    let p = getVal(year+"_present");
    let l = getVal(year+"_leave");
    let a = getVal(year+"_absent");

    let block = document.getElementById(year);

    if (p + l + a === s) {
        block.classList.add("success");
        block.classList.remove("error");
    } else {
        block.classList.add("error");
        block.classList.remove("success");
    }

    checkForm();
}

function checkForm() {
    let blocks = document.querySelectorAll(".year-block");
    let valid = true;

    blocks.forEach(b => {
        if (b.classList.contains("error")) {
            valid = false;
        }
    });

    document.getElementById("saveBtn").disabled = !valid;
}

</script>

</body>
</html>
