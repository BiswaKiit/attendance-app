<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>

    <!-- 📱 Mobile Fix -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Hostel Attendance</h2>
    </div>

    <form method="POST">

        <!-- 📅 Date -->
        <input type="date" name="date" required>

        <!-- 🏢 Hostel -->
        <input type="text" name="hostel" value="KP-15">

        <!-- 🏢 Floor -->
        <select name="floor">
            {% for f in floors %}
            <option value="{{f}}">{{f}}</option>
            {% endfor %}
        </select>

        <!-- 🧮 Floor Strength -->
        <input type="number" id="floor_strength" name="floor_strength" placeholder="Floor Total Strength">

        <hr>

        <!-- 🔁 Years -->
        {% for year in years %}
        <div class="year-block" id="{{year}}">
            <b>{{year}}</b>

            <div class="row">
                <input type="number" placeholder="Strength" name="{{year}}_strength" oninput="validate('{{year}}')">
                <input type="number" placeholder="Present" name="{{year}}_present" oninput="validate('{{year}}')">
            </div>

            <div class="row">
                <input type="number" placeholder="Leave" name="{{year}}_leave" oninput="validate('{{year}}')">
                <input type="number" placeholder="Absent" name="{{year}}_absent" oninput="validate('{{year}}')">
            </div>

        </div>
        {% endfor %}

        <button type="submit">Save Attendance</button>

    </form>

</div>

<div class="footer">
    Created by Biswa ranjan Mishra
</div>

<!-- ⚡ Smart Validation -->
<script>

function getVal(name) {
    let el = document.getElementsByName(name)[0];
    return el && el.value ? parseInt(el.value) : 0;
}

function validate(year) {

    let s = getVal(year+"_strength");
    let p = getVal(year+"_present");
    let l = getVal(year+"_leave");
    let a = getVal(year+"_absent");

    let block = document.getElementById(year);

    if (s === 0 && p === 0 && l === 0 && a === 0) {
        block.classList.remove("error", "success");
        return;
    }

    if (p + l + a === s) {
        block.classList.add("success");
        block.classList.remove("error");
    } else {
        block.classList.add("error");
        block.classList.remove("success");
    }
}

</script>

</body>
</html>
