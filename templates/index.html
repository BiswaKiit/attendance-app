<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

.title {
    text-align: center;
    color: white;
    font-weight: bold;
    margin-bottom: 10px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 5px;
}

.row input, .row select {
    flex: 1;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4facfe;
    color: white;
}

td, th {
    padding: 6px;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

.success { color: green; }
.error { color: red; }

.footer {
    text-align: center;
    color: white;
    margin: 10px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🏨 KING PALACE - 15</div>

<!-- 📥 ENTRY -->
<div class="card">
<h3>📥 Attendance Entry</h3>

<form method="POST">

<input type="date" name="date" required>

<select name="floor" required>
<option value="">Select Floor</option>
{% for f in floors %}
<option value="{{f}}">{{f}}</option>
{% endfor %}
</select>

<div class="row">
<input type="number" name="floor_strength" placeholder="Floor Strength" required>

<select name="attendant" required>
<option value="">Attendant</option>
<option>Sunam</option>
<option>Rabi Narayan</option>
<option>Nrushingha</option>
<option>Satya</option>
<option>Alok</option>
<option>Sarat</option>
<option>Subasish</option>
</select>
</div>

<table border="1">
<tr>
<th>Year</th>
<th>Str</th>
<th>Pre</th>
<th>Leave</th>
<th>Abs</th>
</tr>

{% for y in years %}
<tr>
<td>{{y}}</td>
<td><input name="{{y}}_strength" required></td>
<td><input name="{{y}}_present" required></td>
<td><input name="{{y}}_leave" required></td>
<td><input name="{{y}}_absent" required></td>
</tr>
{% endfor %}

</table>

<button type="submit">💾 Save Data</button>

</form>

{% if message %}
<p class="{{ 'success' if '✅' in message else 'error' }}">{{message}}</p>
{% endif %}

</div>


<!-- 📊 REPORT -->
<div class="card">
<h3>📊 Generate Report</h3>

<form method="POST" action="/report">

<select name="report_type" required>
<option value="">Select Type</option>
<option value="summary">Summary</option>
<option value="partly">Part Report</option>
<option value="full">Full Report</option>
</select>

<input type="date" name="date" required>

<button type="submit">📊 Generate</button>

</form>

</div>

</div>

<div class="footer">Created by Biswa 🚀</div>

</body>
</html>
