<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Entry</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #333;
}

/* FORM TOP */
.form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}

.form-row input, .form-row select {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}

th {
    background: #4facfe;
    color: white;
    padding: 8px;
}

td {
    padding: 6px;
}

input[type="number"] {
    width: 100%;
    padding: 6px;
    text-align: center;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    background: #00c853;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #00a844;
}

/* MESSAGE */
.msg {
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}

/* MOBILE */
@media (max-width: 600px) {
    table {
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>📊 Attendance Entry</h2>

<form method="POST">

<!-- TOP SECTION -->
<div class="form-row">
    <input type="date" name="date" required>

    <select name="floor" required>
        <option value="">Select Floor</option>
        {% for f in floors %}
        <option value="{{f}}">{{f}}</option>
        {% endfor %}
    </select>

    <input type="text" name="hostel" placeholder="Hostel (Default KP-15)">

    <input type="number" name="floor_strength" placeholder="Floor Strength" required>
</div>

<!-- TABLE -->
<table border="1">
<tr>
    <th>Year</th>
    <th>Strength</th>
    <th>Present</th>
    <th>Leave</th>
    <th>Absent</th>
</tr>

{% for y in years %}
<tr>
    <td><b>{{y}}</b></td>

    <td><input type="number" name="{{y}}_strength" oninput="calc('{{y}}')"></td>
    <td><input type="number" name="{{y}}_present" oninput="calc('{{y}}')"></td>
    <td><input type="number" name="{{y}}_leave" oninput="calc('{{y}}')"></td>
    <td><input type="number" name="{{y}}_absent" readonly></td>
</tr>
{% endfor %}

</table>

<button type="submit">💾 Save Data</button>

</form>

{% if message %}
<div class="msg">{{message}}</div>
{% endif %}

</div>

<!-- SMART CALC SCRIPT -->
<script>
function calc(year) {
    let s = parseInt(document.getElementsByName(year+"_strength")[0].value) || 0;
    let p = parseInt(document.getElementsByName(year+"_present")[0].value) || 0;
    let l = parseInt(document.getElementsByName(year+"_leave")[0].value) || 0;

    let absent = s - (p + l);
    if(absent < 0) absent = 0;

    document.getElementsByName(year+"_absent")[0].value = absent;
}
</script>

</body>
</html>
