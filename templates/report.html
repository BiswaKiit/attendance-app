<!DOCTYPE html>
<html>
<head>
    <title>Report</title>
</head>
<body>

<h2>Report</h2>

<a href="/download?month={{month}}">
    <button>⬇ Download Excel</button>
</a>

<button onclick="shareReport()">📤 Share</button>

<hr>

<h3>Total Strength: {{total_strength}}</h3>
<h3>Total Present: {{total_present}}</h3>
<h3>Total Leave: {{total_leave}}</h3>

<script>
function shareReport() {
    if (navigator.share) {
        navigator.share({
            title: "Attendance Report",
            url: window.location.href
        });
    } else {
        alert("Sharing not supported");
    }
}
</script>

</body>
</html>
