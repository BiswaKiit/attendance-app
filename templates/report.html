<!DOCTYPE html>
<html>
<head>
<title>Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; padding:10px;}
.card {background:#f9f9f9; padding:10px; margin-bottom:10px; border-radius:10px;}
</style>
</head>

<body>

<h2>📊 Report</h2>

{% for d in data %}
<div class="card">

<b>Date:</b> {{d.date}} <br>
<b>Floor:</b> {{d.floor}} <br>
<b>Strength:</b> {{d.floor_strength}} <br>

<table border="1" width="100%">
<tr><th>Year</th><th>P</th><th>L</th><th>A</th></tr>

{% for year, y in d.year_data.items() %}
<tr>
<td>{{year}}</td>
<td>{{y.Present}}</td>
<td>{{y.Leave}}</td>
<td>{{y.Absent}}</td>
</tr>
{% endfor %}

</table>

</div>
{% endfor %}

</body>
</html>
